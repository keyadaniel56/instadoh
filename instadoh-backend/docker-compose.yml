version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: instadoh-db
    environment:
      POSTGRES_USER: instadoh
      POSTGRES_PASSWORD: instadoh_secret
      POSTGRES_DB: instadoh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U instadoh"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: instadoh-api
    ports:
      - "8080:8080"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: instadoh
      DB_PASSWORD: instadoh_secret
      DB_NAME: instadoh
      DB_SSLMODE: disable
      LND_HOST: lnd:10009
      LND_TLS_CERT: /lnd/tls.cert
      LND_MACAROON: /lnd/admin.macaroon
      EXCHANGE_API_KEY: ""
      EXCHANGE_BASE_URL: https://api.exchangerate-api.com/v4/latest
      EXCHANGE_CACHE_TTL: 300
      JWT_SECRET: change-me-to-a-very-long-and-secure-random-string
      JWT_EXPIRATION_HOURS: 24
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Optional: LND Lightning Node
  # lnd:
  #   image: lnzap/lnd:latest
  #   container_name: instadoh-lnd
  #   ports:
  #     - "10009:10009"  # gRPC
  #     - "9735:9735"    # P2P
  #   volumes:
  #     - lnd_data:/root/.lnd
  #   environment:
  #     LND_ALIAS: instadoh
  #     LND_RPCLISTEN: 0.0.0.0:10009
  #     LND_LISTEN: 0.0.0.0:9735
  #     LND_BITCOIN_MAINNET: "true"
  #     LND_BITCOIN_NODE: bitcoind
  #   command: ["lnd"]

volumes:
  postgres_data:
  # lnd_data: